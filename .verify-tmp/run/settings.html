<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Settings · dokumenteraren</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-mark">D</span>
        <span>dokumenteraren</span>
      </a>
      
      <nav class="nav">
        <a href="/">Arkiv</a>
        <a href="/upload">Ladda upp</a>
        <a href="/chat">Prata</a>
        <a href="/settings">Settings</a>
      </nav>
      <form method="post" action="/logout" class="logout">
        <input type="hidden" name="csrf_token" value="TIp9Q7kRw4M8uQVgJ_nO0JyuurxMT57i8wStBymmIuI">
        <button class="icon-button" title="Logga ut">Ut</button>
      </form>
      
    </header>
    <main class="shell">
      
<section class="page-head">
  <div>
    <p class="eyebrow">Drift</p>
    <h1>Settings</h1>
  </div>
</section>




<section class="settings-grid">
  <article class="work-panel">
    <h2>AI-provider</h2>
    <form method="post" action="/settings/ai" class="form-grid">
      <input type="hidden" name="csrf_token" value="TIp9Q7kRw4M8uQVgJ_nO0JyuurxMT57i8wStBymmIuI">
      <label>Provider
        <select name="ai_provider">
          <option value="disabled" selected>Disabled</option>
          <option value="openai" >OpenAI</option>
          <option value="claude" >Claude</option>
          <option value="ollama" >Ollama</option>
        </select>
      </label>
      <label>OpenAI API key <input type="password" name="ai_openai_api_key" placeholder="tom"></label>
      <label>OpenAI modell <input name="ai_openai_model" value="gpt-4o-mini"></label>
      <label>OpenAI base URL <input name="ai_openai_base_url" value="https://api.openai.com/v1"></label>
      <label>Claude API key <input type="password" name="ai_claude_api_key" placeholder="tom"></label>
      <label>Claude modell <input name="ai_claude_model" value="claude-3-5-haiku-latest"></label>
      <label>Ollama base URL <input name="ai_ollama_base_url" value="http://host.docker.internal:11434"></label>
      <label>Ollama modell <input name="ai_ollama_model" value="llama3.1"></label>
      <label>Timeout sekunder <input name="ai_timeout_seconds" value="30"></label>
      <button class="primary">Spara AI-settings</button>
    </form>
    <form method="post" action="/settings/ai/test" class="inline-form">
      <input type="hidden" name="csrf_token" value="TIp9Q7kRw4M8uQVgJ_nO0JyuurxMT57i8wStBymmIuI">
      <button>Testa och aktivera provider</button>
    </form>
  </article>

  <article class="work-panel">
    <h2>LAN API</h2>
    <form method="post" action="/settings/api-token" class="inline-form">
      <input type="hidden" name="csrf_token" value="TIp9Q7kRw4M8uQVgJ_nO0JyuurxMT57i8wStBymmIuI">
      <input name="token_name" value="LAN API">
      <button>Skapa token</button>
    </form>
    <table>
      <thead><tr><th>Namn</th><th>Skapad</th><th>Senast använd</th></tr></thead>
      <tbody>
        
      </tbody>
    </table>
  </article>

  <article class="work-panel">
    <h2>SMTP2GO</h2>
    <p class="muted">Status: saknar env</p>
    <form method="post" action="/settings/test-mail" class="inline-form">
      <input type="hidden" name="csrf_token" value="TIp9Q7kRw4M8uQVgJ_nO0JyuurxMT57i8wStBymmIuI">
      <input name="to_addr" type="email" placeholder="mottagare@example.com" required>
      <button>Skicka testmail</button>
    </form>
    <form method="post" action="/export/mail" class="inline-form">
      <input type="hidden" name="csrf_token" value="TIp9Q7kRw4M8uQVgJ_nO0JyuurxMT57i8wStBymmIuI">
      <input name="to_addr" type="email" placeholder="mottagare@example.com" required>
      <input name="ids" placeholder="1,2,3 eller tomt för alla">
      <button>Maila ZIP-export</button>
    </form>
  </article>
</section>

    </main>
  </body>
</html>
