{% extends "base.html" %}
{% block title %}Byt lösenord · dokumenteraren{% endblock %}
{% block content %}
<section class="auth-panel">
  <div>
    <p class="eyebrow">Första inloggning</p>
    <h1>Byt adminlösenord</h1>
    <p class="muted">Arkivet öppnas först när standardlösenordet är ersatt.</p>
  </div>
  {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
  <form method="post" action="/change-password" class="form-stack">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>Nuvarande lösenord <input name="current_password" type="password" required></label>
    <label>Nytt lösenord <input name="new_password" type="password" minlength="8" required></label>
    <label>Upprepa nytt lösenord <input name="confirm_password" type="password" minlength="8" required></label>
    <button class="primary">Spara lösenord</button>
  </form>
</section>
{% endblock %}
