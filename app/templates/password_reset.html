{% extends "base.html" %}
{% block title %}Sätt lösenord · dokumenteraren{% endblock %}
{% block content %}
<section class="auth-panel">
  <p class="eyebrow">Lösenordsreset</p>
  <h1>Sätt nytt lösenord</h1>
  {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
  <form method="post" class="form-stack">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>Nytt lösenord <input name="password" type="password" minlength="8" required autofocus></label>
    <label>Upprepa nytt lösenord <input name="confirm_password" type="password" minlength="8" required></label>
    <button class="primary">Spara lösenord</button>
  </form>
</section>
{% endblock %}
