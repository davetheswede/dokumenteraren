{% extends "base.html" %}
{% block title %}Login · dokumenteraren{% endblock %}
{% block content %}
<section class="auth-panel">
  <div>
    <p class="eyebrow">Privat dokumentarkiv</p>
    <h1>Logga in</h1>
    <p class="muted">Första admin är <code>admin</code> med lösenord <code>12345</code>. Lösenordsbyte krävs direkt.</p>
  </div>
  {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
  <form method="post" action="/login" class="form-stack">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>Användarnamn <input name="username" autocomplete="username" required autofocus></label>
    <label>Lösenord <input name="password" type="password" autocomplete="current-password" required></label>
    <button class="primary">Logga in</button>
  </form>
</section>
{% endblock %}
