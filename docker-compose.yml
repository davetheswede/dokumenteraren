services:
  dokumenteraren:
    build: .
    container_name: dokumenteraren
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      APP_PORT: 12006
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-env}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      MAIL_FROM: ${MAIL_FROM:-noreply@ath0.se}
    ports:
      - "12006:12006"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:12006/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
